<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>案C: ダーク和モダン</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "Hiragino Mincho ProN", "Yu Mincho", serif;
    background: radial-gradient(ellipse at 50% 0%, #1c2430 0%, #0d1118 65%);
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 12px; gap: 12px;
  }
  .title { color: #7d8aa0; font-size: 13px; letter-spacing: 4px; }
  .turn {
    color: #e8d9a0; font-size: 13px; letter-spacing: 2px;
    padding: 5px 22px; border: 1px solid rgba(232,217,160,.35);
    border-radius: 999px; background: rgba(232,217,160,.06);
  }
  .board {
    display: grid;
    grid-template-columns: repeat(9, min(9vw, 52px));
    grid-template-rows: repeat(9, min(9.4vw, 54px));
    background: #151b24;
    border: 1px solid #3a4557;
    box-shadow: 0 0 60px rgba(90,140,220,.12), 0 14px 40px rgba(0,0,0,.6);
  }
  .cell {
    border: 1px solid #2a3342;
    display: flex; align-items: center; justify-content: center;
    position: relative;
  }
  .cell.selected { background: rgba(120,170,255,.18); box-shadow: inset 0 0 0 1px #6f9ddf; }
  .cell.movable::after {
    content: ""; position: absolute; width: 24%; height: 24%;
    border-radius: 50%; background: rgba(120,170,255,.55);
    box-shadow: 0 0 8px rgba(120,170,255,.6);
  }
  .piece {
    width: 82%; height: 88%;
    clip-path: polygon(50% 0%, 92% 22%, 100% 100%, 0% 100%, 8% 22%);
    display: flex; align-items: center; justify-content: center;
  }
  .piece span { font-size: min(5.2vw, 28px); font-weight: 600; margin-top: 14%; }
  .piece.sente {
    background: linear-gradient(170deg, #2e3848, #232a36);
    box-shadow: inset 0 0 0 1px #55657f, 0 2px 6px rgba(0,0,0,.5);
    color: #d9e4f5;
  }
  .piece.gote {
    transform: rotate(180deg);
    background: linear-gradient(170deg, #453126, #33241c);
    box-shadow: inset 0 0 0 1px #8a6a4a, 0 2px 6px rgba(0,0,0,.5);
    color: #f0dfc0;
  }
  .hand-row {
    width: 100%; max-width: 520px;
    display: flex; align-items: center; gap: 10px;
    font-size: 12px; color: #7d8aa0;
  }
  .hand {
    flex: 1; min-height: 44px;
    background: rgba(255,255,255,.04);
    border: 1px solid #2a3342; border-radius: 10px;
    display: flex; align-items: center; padding: 5px 10px; gap: 8px;
  }
  .hand-piece {
    width: 33px; height: 37px; position: relative;
    clip-path: polygon(50% 0%, 92% 22%, 100% 100%, 0% 100%, 8% 22%);
    display: flex; align-items: center; justify-content: center;
    font-size: 17px;
  }
  .hand.sente .hand-piece { background: #2e3848; color: #d9e4f5; }
  .hand.gote .hand-piece { background: #453126; color: #f0dfc0; }
  .hp-kanji { margin-top: 5px; }
  .hp-count {
    position: absolute; right: 0; bottom: 0; font-size: 10px;
    background: #6f9ddf; color: #0d1118; border-radius: 50%;
    width: 14px; height: 14px; display: flex; align-items: center; justify-content: center;
  }
</style>
</head>
<body>
  <div class="title">― 案C ダーク和モダン ―</div>
  <div class="hand-row"><span>☖後手</span><div id="hand-gote"></div></div>
  <div class="turn">▲ 先手番</div>
  <div id="board-wrap"></div>
  <div class="hand-row"><span>☗先手</span><div id="hand-sente"></div></div>
<script src="common.js"></script>
<script>
  renderBoard(document.getElementById("board-wrap"), { demo: true });
  renderHand(document.getElementById("hand-sente"), "sente", [["歩", 2], ["銀", 1]]);
  renderHand(document.getElementById("hand-gote"), "gote", [["歩", 1]]);
</script>
</body>
</html>
